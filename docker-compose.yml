services:
  postgres:
    image: postgres:17
    container_name: ebull-postgres
    # restart on-failure:5 (NOT unless-stopped) — #1446 follow-up / RCA
    # 2026-06-03. unless-stopped converted an OOM-during-recovery into a
    # SILENT 18h infinite loop (RestartCount hit 19): each restart replayed
    # the same frozen redo pointer, OOM'd at the cgroup, restarted. on-failure
    # with a cap surfaces the wedge instead of hiding it. Do NOT wire the
    # healthcheck below to auto-restart — that re-creates the loop.
    restart: on-failure:5
    # #1208 Sub 1 — bound container memory + give PG enough shared memory
    # for parallel workers + autovacuum on partitioned ownership tables.
    # shared_buffers=2GB (set in the ``command`` block below) needs the
    # container to actually have memory available; default shm_size of 64MB
    # starves PG17 parallel workers under load.
    #
    # NOTE (RCA 2026-06-03, docs/proposals/etl/2026-06-03-pg-recovery-oom-rca.md):
    # the recurring recovery OOM is NOT a shared_buffers / WAL-replay-headroom
    # problem (the old #1395 framing below is FALSIFIED). The driver is
    # per-relation memory (relcache/smgr + kernel dentry/inode slab) over
    # ~700k LEAKED test-DB relation files written into THIS cluster's WAL by
    # the full pytest suite. No knob under the 6g cap fixes a 700k-relation
    # replay. The structural fix is keeping the test suite on a SEPARATE/tmpfs
    # cluster (C1) so its WAL can never enter ebull recovery; this is tracked
    # and MUST land before declaring the loop closed. shared_buffers stays 2GB
    # (lowering it frees ~0 — it only ever faults ~720MB during recovery).
    #
    # Historical (#1395, 2026-05-30) — raised 4g→6g believing recovery was
    # WAL-replay-headroom bound. Superseded by the RCA above.
    mem_limit: 6g
    shm_size: 1g
    # #1410 — runtime tuning as command-line ``-c`` flags (single source of
    # truth in repo; survives a pgdata volume wipe). Command-line options
    # take precedence over ``postgresql.conf`` AND ``ALTER SYSTEM`` /
    # ``postgresql.auto.conf`` (PG docs §19.1.4), so these are the effective
    # values and they SUPERSEDE the now-legacy ALTER SYSTEM statements in
    # ``sql/155_postgres_runtime_tuning.sql`` (which carried OOM-causing
    # values: max_wal_size=4GB, work_mem=32MB, no bgwriter/autovacuum caps).
    #
    # Why command flags, not a migration:
    #   - ``max_locks_per_transaction`` and ``shared_buffers`` are
    #     restart-required. A migration's ALTER SYSTEM cannot make them take
    #     effect on a fresh install (nothing restarts PG between migrate and
    #     bootstrap), so the #1187 max_locks guard would hard-fail boot at 64
    #     and shared_buffers would sit at the 128MB default → OOM.
    #   - command flags apply at every container start with zero restart
    #     dance, so a fresh ``docker compose up`` boots correctly.
    #
    # OOM-safe values validated live under the 6g cgroup (#1395): held PG
    # memory ~67% (peak 72%) through the companyfacts ingest peak. Smaller
    # max_wal_size + aggressive bgwriter + capped autovacuum keep the
    # checkpointer's dirty-page/WAL backlog inside the cgroup limit.
    command:
      - postgres
      - -c
      - max_locks_per_transaction=1024  # #1187 floor — guard hard-fails below this
      - -c
      # #1444 — crash-recovery dead-time lever. Default ``fsync`` recursively
      # open()+fsync()s EVERY file under PGDATA during the pre-fsync pass after
      # an unclean shutdown; that walk is file-count-bound and costs HOURS when
      # leaked test-worker DBs bloat the data dir to tens of millions of files
      # (observed 2026-06-02: ~30M files → multi-hour recovery). ``syncfs``
      # issues one syncfs() per filesystem instead of per-file opens, making
      # recovery seconds regardless of file count. Linux-only (Docker Desktop
      # runs a Linux VM, so syncfs() is available); acceptable for single-volume
      # dev. Does NOT remove the need to reap orphan DBs (catalog/planner bloat)
      # — it removes the recovery STALL. See data-engineer SKILL §14.
      - recovery_init_sync_method=syncfs
      - -c
      # Bound the work_mem×connections×hash_mem product (executor memory). The 3
      # app pools (#719) cap real backend conns at ~18; 30 = headroom while keeping
      # the OOM exposure provably bounded regardless of pool config drift. Without
      # this, PG defaults to 100 → 100×16MB×2.0 ≈ 3.2GB executor alone.
      - max_connections=30
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=4GB
      - -c
      - max_wal_size=1GB
      - -c
      - min_wal_size=256MB
      - -c
      - wal_compression=on
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - bgwriter_lru_maxpages=1000
      - -c
      - bgwriter_delay=50ms
      - -c
      - maintenance_work_mem=256MB
      - -c
      - work_mem=16MB
      - -c
      - autovacuum_work_mem=128MB
      - -c
      - autovacuum_max_workers=2
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ebull}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # Bind to loopback by default (#248). Without the 127.0.0.1 prefix,
    # Docker publishes on 0.0.0.0 and a LAN-reachable host would expose
    # a default-password Postgres. Override via ``POSTGRES_BIND`` if
    # multi-host access is genuinely required.
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Surfaces a wedged cluster as STATUS=unhealthy (visible to a crash-loop
    # detector / `docker ps`) without auto-restarting — auto-restart on
    # unhealthy would re-create the silent loop. start_period 90m: a legit
    # large recovery can run >60min; shorter would flap healthy↔unhealthy.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ebull"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90m

  # Dedicated EPHEMERAL cluster for the pytest suite (C1, #1447 / RCA
  # docs/proposals/etl/2026-06-03-pg-recovery-oom-rca.md).
  #
  # WHY THIS EXISTS: the suite used to create its ebull_test_* DBs in the
  # dev `postgres` service above — same cluster, same pg_wal as the
  # operator's `ebull`. A kill-9'd / OOM'd full-suite run leaked ~700k
  # relations and wrote ~20GB WAL into that shared pg_wal; ebull's crash
  # recovery then had to replay it, OOM'd on the per-relation memory at the
  # 6g cgroup, and looped silently for 18h. Putting the suite on a SEPARATE
  # cluster makes that structurally impossible: its WAL lives in its own
  # pg_wal and can never enter `ebull` recovery.
  #
  # DISK-backed (NOT tmpfs): on the ~7.75g Docker VM, a tmpfs PGDATA charges
  # every byte of test-DB data to the container memory cgroup, so parallel
  # xdist worker-DB clones + a bootstrap test OOM a small mem_limit (observed:
  # tmpfs cluster OOM-killed at 2g mid-suite, then recursed into its own
  # recovery OOM — the very mode we're isolating). A disk volume keeps DB data
  # off RAM so mem_limit only bounds process/recovery memory. Throwaway data:
  # fsync/full_page_writes/synchronous_commit off for speed; the volume is
  # wipeable any time (`docker compose rm -sfv postgres-test`) with zero data
  # loss. restart on-failure:3 (NOT unless-stopped) so a crash surfaces
  # instead of silently looping — and it is isolated from `ebull` regardless.
  #
  # Profile-gated: a normal `docker compose up` does NOT start it, so it never
  # contends for RAM with the 6g dev cluster. Start it for the suite (the
  # pre-push hook does this automatically):
  #   docker compose --profile test up -d postgres-test
  postgres-test:
    image: postgres:17
    container_name: ebull-postgres-test
    profiles: ["test"]
    restart: on-failure:3
    mem_limit: 3g
    shm_size: 512m
    command:
      - postgres
      - -c
      - max_locks_per_transaction=1024   # partitioned ownership tables need it (#1187)
      - -c
      - fsync=off                        # throwaway test data — durability irrelevant, faster
      - -c
      - full_page_writes=off
      - -c
      - synchronous_commit=off
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_TEST_BIND:-127.0.0.1}:${POSTGRES_TEST_PORT:-5433}:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ebull-redis
    restart: unless-stopped
    # Bind to loopback by default (#248). Redis has no auth configured;
    # a 0.0.0.0 publish would hand an unauthenticated cache to anything
    # on the LAN. Override via ``REDIS_BIND`` if needed.
    ports:
      - "${REDIS_BIND:-127.0.0.1}:${REDIS_PORT:-6379}:6379"

volumes:
  pgdata:
  pgdata_test:
